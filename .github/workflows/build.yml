name: build-cores
on:
  push: { branches: [main] }
  pull_request:
jobs:
  cores:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Cache third_party sources
        uses: actions/cache@v4
        with:
          path: third_party
          key: third-party-${{ hashFiles('build/versions.sh') }}
      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: build/out
          key: build-out-${{ hashFiles('build/**/*.sh', 'build/Dockerfile', 'build/patches/**') }}
      - run: make image
      - run: make fetch
      - run: make libs
      - run: make cores
      - run: bash build/gen-sources-json.sh && git diff --exit-code packages/*/sources.json
      - run: npm run test:smoke
      - uses: actions/upload-artifact@v4
        with:
          name: cores
          path: packages/*/dist/

  lib:
    runs-on: ubuntu-latest
    needs: cores
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: actions/download-artifact@v4
        with:
          name: cores
          path: packages/
      - run: npm ci
      - run: npm run build:lib
      - run: npm run test:unit
      - run: npm run test:node
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run test:browser
